        }

            max-width: 700px;
            padding: 30px;

            border: 2px solid var(--earth-blue);

            text-align: center;
        }

        h1 {
            color: var(--star-gold);
            margin-top: 0;
        }

        .hidden {
            display: none;
        }

        .btn {
            background: var(--earth-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover {
            background: #1557b0;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: #555;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--earth-blue);
            color: white;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
        }

        .option-btn:hover {
            background: rgba(26, 115, 232, 0.2);
        }

        .correct {
            background: #2e7d32 !important;
            border-color: #4caf50;
        }

        .wrong {
            background: #c62828 !important;
            border-color: #f44336;
        }

        #feedback {
            font-weight: bold;
            margin: 15px 0;
            min-height: 24px;
        }

        .progress-bar {
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--star-gold);
            width: 0%;
            transition: width 0.3s;
        }

        .review-item {
            text-align: left;
            border-bottom: 1px solid #444;
            padding: 10px 0;
        }

        .review-q {
            color: var(--star-gold);
            font-weight: bold;
        }

</head>

            document.getElementById('question-text').innerHTML = `<span style="color:#ffd700;">${currentIdx + 1}.</span> ${qData.q}`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            document.getElementById('next-btn').classList.add('hidden');

            document.getElementById('progress-fill').style.width = `${progressPercent}%`;

                container.appendChild(btn);

        function checkAnswer(choice, btn) {
            if (!document.getElementById('next-btn').classList.contains('hidden')) return;

            const correctIndex = currentQuestions[currentIdx].correct;
            userAnswers.push(choice);
            const allBtns = document.querySelectorAll('.option-btn');

            if (choice === correctIndex) {
                btn.classList.add('correct');
                document.getElementById('feedback').innerHTML = "🌟 Parabéns, astronauta! Resposta correta!";
                score++;
