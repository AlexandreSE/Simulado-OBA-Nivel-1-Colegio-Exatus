<style>
:root {
    --space-dark: #0b0d17;
    --star-gold: #ffd700;

    --text-light: #f0f0f0;
}

body {
    font-family: Arial, sans-serif;
    background: var(--space-dark);
    color: var(--text-light);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

#app-container {
    width: 90%;
    max-width: 700px;
    padding: 20px;
    border-radius: 15px;
    border: 2px solid var(--earth-blue);
    text-align: center;
}

.hidden { display: none; }

.btn {
    padding: 12px 20px;
    border: none;
    background: var(--earth-blue);
    color: white;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
}

.option-btn {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 10px;
    cursor: pointer;
}

.correct { background: #2e7d32; }
.wrong { background: #c62828; }

.progress-bar {
    height: 8px;
    background: #333;
    margin-bottom: 10px;
}

#progress-fill {
    height: 100%;
    background: gold;
    width: 0%;
}

.review-item {
    text-align: left;
    border-bottom: 1px solid #444;
    padding: 10px 0;
}
</style>
</head>

<div id="app-container">

</div>

const nextBtn = document.getElementById("next-btn");
const restartBtn = document.getElementById("restart-btn");
const retryBtn = document.getElementById("retry-btn");
const reviewBtn = document.getElementById("review-btn");

// ================= EVENTOS =================

restartBtn.addEventListener("click", () => startQuiz(10));
retryBtn.addEventListener("click", retrySame);
nextBtn.addEventListener("click", nextQuestion);
reviewBtn.addEventListener("click", showReview);

// ================= FUNÇÕES =================
function startQuiz(num) {
    currentQuestions = [...questionBank].sort(() => Math.random() - 0.5).slice(0, num);
    currentIdx = 0;
    score = 0;
    userAnswers = [];

    document.getElementById("screen-start").classList.add("hidden");
    document.getElementById("screen-results").classList.add("hidden");
    document.getElementById("screen-quiz").classList.remove("hidden");

    showQuestion();
}

function retrySame() {
    currentIdx = 0;
    score = 0;
    userAnswers = [];

    document.getElementById("screen-results").classList.add("hidden");
    document.getElementById("screen-quiz").classList.remove("hidden");

    showQuestion();
}

function showQuestion() {
    const q = currentQuestions[currentIdx];

    document.getElementById("question-text").innerHTML =
        `<span style="color:gold">${currentIdx+1}.</span> ${q.q}`;

    const container = document.getElementById("options-container");
    container.innerHTML = "";

    document.getElementById("feedback").textContent = "";
    nextBtn.classList.add("hidden");

    const progress = (currentIdx / currentQuestions.length) * 100;
    document.getElementById("progress-fill").style.width = progress + "%";

    q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = `${String.fromCharCode(65+i)} - ${opt}`;

        btn.addEventListener("click", () => checkAnswer(i, btn));

        container.appendChild(btn);
    });
}

function checkAnswer(choice, btn) {
    const correct = currentQuestions[currentIdx].correct;
    const buttons = document.querySelectorAll(".option-btn");

    userAnswers.push(choice);

    buttons.forEach(b => b.disabled = true);

    if (choice === correct) {
        btn.classList.add("correct");
        score++;
        document.getElementById("feedback").textContent = "Resposta correta!";
    } else {
        btn.classList.add("wrong");
        buttons[correct].classList.add("correct");
        document.getElementById("feedback").textContent = "Resposta incorreta!";
    }

    nextBtn.classList.remove("hidden");
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < currentQuestions.length) {
        showQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById("screen-quiz").classList.add("hidden");
    document.getElementById("screen-results").classList.remove("hidden");

    const perc = (score / currentQuestions.length) * 100;

    let stars = perc >= 90 ? "🌟🌟🌟🌟🌟" :
                perc >= 70 ? "🌟🌟🌟🌟" :
                perc >= 50 ? "🌟🌟🌟" :
                perc >= 25 ? "🌟🌟" : "🌟";

    document.getElementById("score-text").innerHTML =
        `Pontuação: ${score}/${currentQuestions.length}<br>${stars}`;

    document.getElementById("review-container").classList.add("hidden");
}

function showReview() {
    const container = document.getElementById("review-container");
    container.innerHTML = "<h3>Revisão:</h3>";

    currentQuestions.forEach((q, i) => {
        const div = document.createElement("div");
        div.className = "review-item";

        const correct = q.options[q.correct];
        const user = q.options[userAnswers[i]] || "Não respondeu";

        div.innerHTML = `
            <b>${i+1}. ${q.q}</b><br>
            Sua: ${user}<br>
            Correta: <span style="color:lightgreen">${correct}</span>
        `;

        container.appendChild(div);
    });

    container.classList.remove("hidden");
}

});
</script>

</body>
</html>
