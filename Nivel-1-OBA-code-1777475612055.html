<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Estelar: Simulado OBA Nível 1</title>
    <style>
        :root {
            --space-dark: #0b0d17;
            --star-gold: #ffd700;
            --earth-blue: #1a73e8;
            --mars-red: #d14d33;
            --text-light: #f0f0f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--space-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
        }

        #app-container {
            background: rgba(20, 25, 45, 0.95);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--earth-blue);
            box-shadow: 0 0 20px rgba(26, 115, 232, 0.5);
            text-align: center;
        }

        h1 { color: var(--star-gold); margin-top: 0; }
        .hidden { display: none; }

        .btn {
            background: var(--earth-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn:hover { background: #1557b0; transform: scale(1.05); }
        .btn-secondary { background: #555; }

        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--earth-blue);
            color: white;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
        }

        .option-btn:hover { background: rgba(26, 115, 232, 0.2); }
        .correct { background: #2e7d32 !important; border-color: #4caf50; }
        .wrong { background: #c62828 !important; border-color: #f44336; }

        #feedback { font-weight: bold; margin: 15px 0; min-height: 24px; }
        .progress-bar { height: 10px; background: #333; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--star-gold); width: 0%; transition: width 0.3s; }
        
        .review-item { text-align: left; border-bottom: 1px solid #444; padding: 10px 0; }
        .review-q { color: var(--star-gold); font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <!-- Tela Inicial -->
    <div id="screen-start">
        <h1>🚀 Missão OBA</h1>
        <p>Prepare-se para viajar pelo universo! Você está pronto para o treinamento de astronauta?</p>
        <button class="btn" onclick="startQuiz(5)">Começar Simulado (5 questões)</button>
    </div>

    <!-- Tela de Questões -->
    <div id="screen-quiz" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <div id="feedback"></div>
        <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Próxima Questão ➡️</button>
    </div>

    <!-- Tela de Resultados -->
    <div id="screen-results" class="hidden">
        <h1>🏆 Missão Concluída!</h1>
        <p id="score-text"></p>
        <div id="review-container" class="hidden"></div>
        
        <button class="btn" onclick="showReview()">🔍 Rever Questões e Respostas</button>
        <button class="btn" onclick="retrySame()">🔄 Refazer com as MESMAS questões</button>
        <button class="btn" onclick="startQuiz(5)">✨ Novo Simulado (Outras questões)</button>
    </div>
</div>

<script>
    // Banco de dados de questões (Baseado nas provas 2010-2023 Nível 1)
    const questionBank = [

    // ===== 2025 =====
    {
        q: "Assinale a afirmação que está toda errada sobre a Lua:",
        options: [
            "A Lua brilha porque tem luz própria, como o Sol",
            "O Sol é a estrela mais próxima da Terra",
            "Da Terra só vemos um lado da Lua",
            "Astronautas visitaram a Lua, mas não moram nela",
            "A Lua é o astro mais próximo da Terra"
        ],
        correct: 0
    },
    {
        q: "Marque a afirmação errada sobre a Lua:",
        options: [
            "Na Lua tem crateras e montanhas",
            "O céu da Lua é preto",
            "Lua cheia nasce quando o Sol se põe",
            "A Lua não tem mares de água",
            "A Lua tem quase o mesmo tamanho do Sol"
        ],
        correct: 4
    },
    {
        q: "Assinale a alternativa correta:",
        options: [
            "Todos os planetas têm luas",
            "Todos giram em 365 dias",
            "Todos têm atmosfera",
            "Todos giram ao redor do Sol no mesmo sentido",
            "Todos foram visitados por astronautas"
        ],
        correct: 3
    },

    // ===== 2024 =====
    {
        q: "Marque a alternativa totalmente errada sobre a Terra:",
        options: [
            "A Terra gira ao redor do Sol",
            "A atmosfera permite a vida",
            "A Terra é plana e tem 4 luas",
            "A Terra é esférica",
            "A Lua é satélite da Terra"
        ],
        correct: 2
    },
    {
        q: "Marque a alternativa errada sobre a Lua:",
        options: [
            "Não tem atmosfera",
            "Tem florestas e astronautas moram lá",
            "O céu não é azul",
            "Tem crateras",
            "É menor que a Terra"
        ],
        correct: 1
    },
    {
        q: "Qual é a ordem correta dos planetas a partir do Sol?",
        options: [
            "Mercúrio, Vênus, Terra, Marte, Júpiter, Saturno, Urano, Netuno",
            "Mercúrio, Terra, Vênus...",
            "Vênus, Marte, Mercúrio...",
            "Mercúrio, Vênus, Marte, Terra...",
            "Ordem aleatória"
        ],
        correct: 0
    },

    // ===== 2023 =====
    {
        q: "Assinale a alternativa correta:",
        options: [
            "A Lua é maior que o Sol",
            "A Lua é satélite artificial",
            "A Lua é satélite natural da Terra e foi visitada",
            "Marte já foi visitado por astronautas",
            "Lua e Marte foram visitados"
        ],
        correct: 2
    },
    {
        q: "Qual alternativa está correta?",
        options: [
            "Mercúrio tem lua",
            "Lua, Marte e Mercúrio têm oceanos",
            "Todos têm luas",
            "Lua, Marte e Mercúrio têm crateras",
            "Mercúrio é maior que Marte"
        ],
        correct: 3
    },

    // ===== 2022 =====
    {
        q: "Qual é o astro mais próximo da Terra?",
        options: [
            "Lua",
            "Marte",
            "Sol",
            "Estrelas",
            "ISS"
        ],
        correct: 0
    },
    {
        q: "Qual astro já foi visitado por astronautas?",
        options: [
            "Lua",
            "Marte",
            "Mercúrio",
            "Plutão",
            "ISS"
        ],
        correct: 0
    },
    {
        q: "Qual planeta é vermelho e tem robôs explorando?",
        options: [
            "Marte",
            "Vênus",
            "Mercúrio",
            "Júpiter",
            "Saturno"
        ],
        correct: 0
    },
    {
        q: "Onde astronautas vivem atualmente?",
        options: [
            "ISS",
            "Vênus",
            "Marte",
            "Saturno",
            "Lua"
        ],
        correct: 0
    },
    {
        q: "Qual planeta é o mais quente e não tem luas?",
        options: [
            "Vênus",
            "Mercúrio",
            "Marte",
            "Júpiter",
            "Saturno"
        ],
        correct: 0
    },
    {
        q: "Qual planeta é o menor e mais próximo do Sol?",
        options: [
            "Mercúrio",
            "Vênus",
            "Marte",
            "Júpiter",
            "Urano"
        ],
        correct: 0
    },

    // ===== QUESTÃO DE DISTÂNCIA (legal pro jogo) =====
    {
        q: "Qual destino é alcançado primeiro por um foguete saindo da Terra?",
        options: [
            "ISS",
            "Lua",
            "Marte",
            "Plutão",
            "Estrela"
        ],
        correct: 0
    }
];

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let userAnswers = [];

    function startQuiz(num) {
        // Seleciona questões aleatórias
        currentQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, num);
        resetState();
    }

    function retrySame() {
        resetState();
    }

    function resetState() {
        currentIdx = 0;
        score = 0;
        userAnswers = [];
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-results').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        document.getElementById('review-container').classList.add('hidden');
        showQuestion();
    }

    function showQuestion() {
        const qData = currentQuestions[currentIdx];
        document.getElementById('question-text').innerText = qData.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').classList.add('hidden');
        
        // Atualiza barra de progresso
        document.getElementById('progress-fill').style.width = `${(currentIdx / currentQuestions.length) * 100}%`;

        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(choice, btn) {
        if (document.getElementById('next-btn').className.indexOf('hidden') === -1) return;
        
        const correct = currentQuestions[currentIdx].correct;
        userAnswers.push(choice);
        
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.cursor = 'default');

        if (choice === correct) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerHTML = "🌟 Parabéns! Você acertou!";
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
            document.getElementById('feedback').innerHTML = "🚀 Quase! O conhecimento é uma jornada!";
        }
        
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-results').classList.remove('hidden');
        document.getElementById('score-text').innerText = `Você completou a missão com ${score} de ${currentQuestions.length} pontos!`;
    }

    function showReview() {
        const container = document.getElementById('review-container');
        container.innerHTML = '<h3>Revisão da Missão:</h3>';
        currentQuestions.forEach((q, i) => {
            const item = document.createElement('div');
            item.className = 'review-item';
            const status = (userAnswers[i] === q.correct) ? "✅" : "❌";
            item.innerHTML = `
                <div class="review-q">${i+1}. ${q.q} ${status}</div>
                <div>Sua resposta: ${q.options[userAnswers[i]]}</div>
                <div style="color: #4caf50">Correta: ${q.options[q.correct]}</div>
            `;
            container.appendChild(item);
        });
        container.classList.remove('hidden');
    }
</script>

</body>
</html>
